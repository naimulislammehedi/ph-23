<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body {
            border: 2px solid red;
            margin: 2px;
        }
        section {
            border: 2px solid green;
            margin: 2px;
        }
        ul {
            border: 2px solid purple;
            margin: 2px; 
        }
        li {
            border: 2px solid red;
            margin: 2px;
        }

    </style>
</head>
<body id="body">
    <h1>Explore Event bubble</h1>
    <section id="list-container">
        <h3>List of things</h3>
        <ul id="item-list">
            <li id="item-1">Lorem, ipsum.</li>
            <li id="item-2">Veniam, sed!</li>
            <li id="item-3">Beatae, commodi.</li>
            <li id="item-4">Vel, ipsa?</li>
            <li id="item-5">Sapiente, odit.</li>
            <li id="item-6">Quibusdam, non.</li>
        </ul>
    </section>

    <script>
        // list item 2 click handler 
        document.getElementById("item-2").addEventListener("click", function(event) {
            console.log("item 2 clicked"); 
            event.stopPropagation(); 
        })

        // list item 2 click handler 
        document.getElementById("item-2").addEventListener("click", function(event) {
            console.log("item 2 second clicked"); 
            // event.stopPropagation(); 
        })

        // list item 2 click handler 
        document.getElementById("item-2").addEventListener("click", function(event) {
            console.log("item 2 third clicked"); 
            // event.stopPropagation(); 
        })

        // ol click handler 
        document.getElementById("item-list").addEventListener("click", function() {
            console.log("ol clicked"); 
        })

        // section click handler 
        document.getElementById("list-container").addEventListener("click", function() {
            console.log("section clicked"); 
        })

        // body click handler 
        document.getElementById("body").addEventListener("click", function() {
            console.log("body clicked"); 
        })
    </script>
</body>
</html>
